<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチャを引く | Meetupガチャ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <header class="header">
        <h1>Meetupガチャ</h1>
    </header>

    <main class="gacha-container">
        
        <div class="user-status">
            <p>あなたの属性：<strong id="user-info">読み込み中...</strong></p>
        </div>

        <div class="action-group">
            <button id="draw-btn" class="submit-btn" disabled>データを読み込み中...</button>
        </div>

        <div id="draw-time" style="margin-top: 20px; font-weight: bold; color: #4d1001; display: none; text-align: center; font-size: 15px;"></div>

        <div id="animation-area" class="animation-box">
            ガチャガチャを回しています...<br>
            <div class="shake-emoji">🎁</div>
        </div>

        <div id="result-area" class="result-box"></div>

    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gradYearValue = urlParams.get('grad_year');
        const majorType = urlParams.get('major_type');

        const yearDisplayMap = {
            "2027": "27卒",
            "2028": "28卒",
            "2029": "29卒",
            "2030": "30卒"
        };

        if (gradYearValue && majorType) {
            const displayYear = yearDisplayMap[gradYearValue] || gradYearValue;
            document.getElementById('user-info').textContent = `${displayYear} / ${majorType}`;
        } else {
            document.getElementById('user-info').textContent = "属性が正しく取得できませんでした。";
        }

        let gachaPools = {}; 

        async function loadGachaDataFromJSON() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("JSONファイルの読み込みに失敗");
                const jsonData = await response.json();
                const pools = {};
                
                jsonData.forEach(item => {
                    const gradRaw = item.grad || "";
                    const majorRaw = item.major || "";
                    const itemName = item.name || null;
                    const itemImage = item.image || ""; 

                    if (!itemName) return;

                    const grads = (gradRaw.includes("共通") || gradRaw === "") ? ["2027", "2028", "2029", "2030"] : gradRaw.split(/[,、\s]+/);
                    const majors = (majorRaw.includes("共通") || majorRaw === "") ? ["文系", "理系"] : majorRaw.split(/[,、\s]+/);

                    grads.forEach(grad => {
                        majors.forEach(major => {
                            const key = `${grad.trim()}_${major.trim()}`;
                            if (!pools[key]) pools[key] = [];
                            pools[key].push({ name: itemName, image: itemImage });
                        });
                    });
                });
                return pools;
            } catch (error) {
                console.error("エラー:", error);
                alert("データの読み込みに失敗しました。");
                return {};
            }
        }

        window.addEventListener("DOMContentLoaded", async () => {
            const btn = document.getElementById('draw-btn');
            const timeDisplay = document.getElementById('draw-time');
            const resultArea = document.getElementById('result-area');

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            const lastDrawDate = localStorage.getItem('meetupGachaDate');

            if (lastDrawDate === todayStr) {
                btn.disabled = true;
                btn.textContent = "本日はプレイ済みです（1日1回）";

                const savedTime = localStorage.getItem('meetupGachaTime');
                const savedResult = localStorage.getItem('meetupGachaResult');

                if (savedTime && savedResult) {
                    timeDisplay.textContent = savedTime;
                    timeDisplay.style.display = 'block';
                    resultArea.innerHTML = savedResult;
                    resultArea.style.display = 'block';
                }
                return; 
            }

            gachaPools = await loadGachaDataFromJSON();
            
            if (Object.keys(gachaPools).length > 0) {
                btn.disabled = false;
                btn.textContent = "ガチャを回す！";
            } else {
                btn.textContent = "データがありません";
            }
        });

        // ガチャを引くボタンを押した時の処理
        document.getElementById('draw-btn').addEventListener('click', function () {
            const btn = this;
            const userKey = `${gradYearValue}_${majorType}`;
            const targetPool = gachaPools[userKey];

            if (!targetPool || targetPool.length === 0) {
                alert("この属性に対応するガチャが用意されていません。");
                return;
            }

            // 1. すぐにボタンを押せないようにして、テキストを変更
            btn.disabled = true;
            btn.textContent = "抽選中...";

            // 2. アニメーションを表示する
            const animationArea = document.getElementById('animation-area');
            animationArea.style.display = 'block';

            // 3. 【3秒待ってから】結果を表示する魔法の処理 (setTimeout)
            setTimeout(() => {
                // アニメーションを隠す
                animationArea.style.display = 'none';

                // 時刻の生成
                const now = new Date();
                const y = now.getFullYear();
                const m = now.getMonth() + 1;
                const d = now.getDate();
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                
                const timeText = `抽選時刻：${y}年${m}月${d}日 ${h}:${min}`;
                const timeDisplay = document.getElementById('draw-time');
                timeDisplay.textContent = timeText;
                timeDisplay.style.display = 'block';

                // ガチャの抽選
                const randomIndex = Math.floor(Math.random() * targetPool.length);
                const resultData = targetPool[randomIndex];

                const resultArea = document.getElementById('result-area');
                
                let htmlContent = `<div style="font-size: 22px; margin-bottom: 15px;">${resultData.name}</div>`;
                
                if (resultData.image) {
                    htmlContent += `<div>
                                        <img src="image/${resultData.image}" alt="${resultData.name}の画像" style="max-width: 100%; height: auto; border-radius: 5px;">
                                    </div>`;
                }

                htmlContent += `<div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #4d1001; font-size: 14px; font-weight: normal; color: #d32f2f; line-height: 1.5; text-align: left;">
                                    🎁 <strong>特典のご案内</strong><br>
                                    この画像または企業のMeetupを画像提示の上、本日中に店頭で予約していただいた方に特典を差し上げます！
                                </div>`;

                resultArea.innerHTML = htmlContent;
                resultArea.style.display = 'block';

                // 記録の保存
                const todayStr = `${y}-${m}-${d}`;
                localStorage.setItem('meetupGachaDate', todayStr);
                localStorage.setItem('meetupGachaTime', timeText);
                localStorage.setItem('meetupGachaResult', htmlContent);

                // ボタンのテキストを最終状態にする
                btn.textContent = "本日はプレイ済みです（1日1回）";

            }, 3000); // ここが「3000ミリ秒 ＝ 3秒」の設定です
        });
    </script>
</body>
</html>
