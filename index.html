<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetupガチャ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="header">
    <img src="image/shirucafe_logo.png" alt="知るカフェロゴ" class="logo">
    
    <div class="arch-title-container">
        <svg viewBox="0 0 500 150" class="arch-title">
            <path id="curve" d="M 50,120 Q 250,20 450,120" fill="transparent" />
            <text width="500">
                <textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">
                    Meetupガチャ
                </textPath>
            </text>
        </svg>
    </div>
    
    <img src="image/gacha.png" alt="ガチャのイメージ" class="hero-image">
    
    <p>以下の項目に回答して、ガチャへ進んでください。</p>
</header>

    <main class="form-container">
        <form action="lottery.html" method="GET">
            
            <div class="form-group">
                <label for="grad_year">卒年</label>
                <select name="grad_year" id="grad_year" required>
                    <option value="" disabled selected>選択してください</option>
                    <option value="2027">27卒</option>
                    <option value="2028">28卒</option>
                    <option value="2029">29卒</option>
                    <option value="2030">30卒</option>
                </select>
            </div>

            <div class="form-group">
                <label>文理</label>
                <div class="radio-group">
                    <input type="radio" id="humanities" name="major_type" value="文系" required>
                    <label for="humanities">文系</label>
                    
                    <input type="radio" id="science" name="major_type" value="理系" required>
                    <label for="science">理系</label>
                </div>
            </div>

            <div class="submit-group">
                <button type="submit" class="submit-btn">次へ</button>
            </div>

        </form>
    </main>

</body>
</html>
